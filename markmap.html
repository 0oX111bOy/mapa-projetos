<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ciclo de Vida de Projetos</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#mindmap {
  width: 100vw;
  height: 100vh;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib"></script>
</head>

<body>

<svg id="mindmap"></svg>

<script>
const { Transformer } = window.markmap;
const { Markmap } = window.markmap;

const markdown = `
# Ciclo de Vida e Governança de Projetos

## Necessidade / Oportunidade
- Problema
- Obrigação legal
- Diretriz estratégica
- Inovação
- Demanda institucional

## Governança do Portfólio
- Registro da demanda
- Avaliação preliminar
- Classificação da iniciativa
- Priorização institucional
- Encaminhamento para análise de viabilidade

## AVI - Análise de Viabilidade

### Elementos
- Problema
- Contexto
- Benefícios esperados
- Alinhamento Estratégico
- Alternativas

### Viabilidade
- Técnica
- Operacional
- Financeira
- Legal
- Temporal

### Análises Complementares
- Riscos preliminares
- Priorização
- Recomendação

## Decisão Institucional
- Aprovar
- Aprovar com condicionantes
- Complementar
- Arquivar

## TAP - Termo de Abertura do Projeto
- Formalização da iniciação
- Patrocinador
- Gerente do Projeto
- Objetivo
- Escopo preliminar
- Premissas
- Restrições
- Orçamento de referência
- Prazo de referência
- Autoridade

## PGP - Plano de Gerenciamento do Projeto

### Governança
- Estrutura de governança
- Papéis e responsabilidades
- Instâncias decisórias

### Escopo Detalhado
- EAP
- Dicionário da EAP

### Planejamento
- Cronograma
- Custos
- Qualidade
- Conformidade
- Riscos
- Recursos
- Comunicações
- Aquisições
- Mudanças

### Linha de Base
- Escopo
- Prazo
- Custos

## Aprovação do Planejamento
- Aprovar execução
- Aprovar com condicionantes
- Solicitar ajustes
- Suspender iniciativa

## Execução

## Monitoramento e Controle

### Relatórios e Registros
- RAP
- Indicadores
- Registro de riscos
- Registro de mudanças
- Registro de decisões
- Registro de pendências

### Controle
- Escopo
- Prazo
- Custos
- Qualidade
- Conformidade

## Encerramento
- Aceite formal
- Verificação de conformidade
- Avaliação dos resultados
- Lições aprendidas
- Arquivamento
`;

const transformer = new Transformer();
const { root } = transformer.transform(markdown);

const mm = Markmap.create('#mindmap', {
  autoFit: true,
  fitRatio: 0.95,
  duration: 500
}, root);

setTimeout(() => mm.fit(), 500);
window.addEventListener('resize', () => mm.fit());
</script>

</body>
</html>
