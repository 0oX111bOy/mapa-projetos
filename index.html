<style>
* {
  margin: 0;
  padding: 0;
}
html {
  font-family: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji',
    'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
}
#mindmap {
  display: block;
  width: 100vw;
  height: 100vh;
}
.markmap-dark {
  background: #27272a;
  color: white;
}

.watermark {
  position: fixed;
  bottom: 20px;
  left: 20px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.10;
  width: 200px;
}

/* Ambas ocupam exatamente o mesmo espaço */
.watermark img {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 200px;
  max-width: 25vw;
}

/* Mostra logo CLARO no modo padrão */
.logo-claro,
.logo-escuro {
  transition: opacity 0.3s ease;
}

.logo-claro {
  opacity: 1;
}

.logo-escuro {
  opacity: 0;
}

.markmap-dark .logo-claro {
  opacity: 0;
}

.markmap-dark .logo-escuro {
  opacity: 1;
}

/* MOBILE */
@media (max-width: 768px) {
  .watermark {
    bottom: 10px;
    left: 10px;
    opacity: 0.05;
  }

  .watermark img {
    width: 120px;
  }
}

/* ✅ MODO ESCURO */
.markmap-dark .watermark {
  color: rgba(255, 255, 255, 0.08);
}

/* ✅ MODO CLARO */
.watermark {
  color: rgba(0, 0, 0, 0.08);
}

/* ✅ FIM — MARCA D’ÁGUA */
